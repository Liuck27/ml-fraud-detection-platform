[pytest]
# Suppress deprecation warnings from third-party packages that haven't yet
# migrated to Pydantic V2 (mlflow.gateway uses V1-style @validator internally).
# Using a message-pattern filter (not a class reference) so the rule works
# in venvs that don't have pydantic installed (e.g. the root integration venv).
filterwarnings =
    ignore:.*Pydantic V1 style.*
