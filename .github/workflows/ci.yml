name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: lint-${{ hashFiles('requirements-dev.txt') }}

      - name: Install lint tools
        run: pip install ruff==0.1.9 black==23.12.1

      - name: ruff check
        run: ruff check .

      - name: black --check
        run: black --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    # Training has partial type coverage; treat failures as warnings for now.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: typecheck-${{ hashFiles('serving/requirements.txt', 'training/requirements.txt') }}

      - name: Install deps
        run: |
          pip install mypy==1.7.1
          pip install -r serving/requirements.txt
          pip install -r training/requirements.txt

      - name: mypy serving/
        run: mypy serving/app/ --ignore-missing-imports

      - name: mypy training/
        run: mypy training/ --ignore-missing-imports --exclude training/notebooks

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: test-${{ hashFiles('serving/requirements.txt', 'requirements-dev.txt') }}

      - name: Install deps
        run: |
          pip install -r requirements-dev.txt
          pip install -r serving/requirements.txt

      - name: Run serving tests
        # Tests use mocked MLflow — no live services required.
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest serving/tests/ -v --tb=short --cov=serving --cov-report=term-missing
