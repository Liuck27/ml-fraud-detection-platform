groups:
  - name: fraud_detection
    rules:
      - alert: HighFraudRate
        expr: |
          rate(inference_total{prediction="fraud"}[5m])
          / rate(inference_total[5m]) > 0.10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Fraud rate above 10% for 2 minutes"
          description: "{{ $value | humanizePercentage }} of requests are predicted as fraud."

      - alert: HighInferenceLatency
        expr: |
          histogram_quantile(0.99,
            rate(inference_latency_seconds_bucket[5m])) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "p99 inference latency above 500ms"
          description: "p99 latency is {{ $value | humanizeDuration }}."

      - alert: InferenceErrorSpike
        expr: rate(inference_errors_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Inference error rate above 0.1 errors/s"
          description: "Error rate is {{ $value | humanize }} errors/s."
